# 日志配置
logging:
  level: "INFO"
  format: "detailed"
  file_path: "./logs/afa.log"
  rotation: "10 MB"
  retention: "7 days"
  compression: "zip"

# 特征提取配置
feature_extraction:
  spatial:
    enable_lbp: true
    enable_glcm: true
    enable_edge: true

  # 多模态特征配置
  frequency:
    enable_fft: true
    enable_dct: true
    enable_wavelet: true
    wavelet_type: "db4"
    wavelet_levels: 3

  # 鲁棒性测试
  noise_robustness:
    enable: true
    noise_types: ["gaussian", "salt_pepper"]
    intensity_range: [0.01, 0.1]

  # 执行图像语义特征模式
  semantic_llm:
