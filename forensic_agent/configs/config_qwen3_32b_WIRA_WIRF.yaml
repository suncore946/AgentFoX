# Agent推理配置
agent:
  max_iterations: 40
  # 是否引入校准
  open_calibration: true
  # 是否引入执行聚类
  open_clustering: true
  # 是否引入语义分析
  open_semantic: true
  # 是否引入专家分析
  open_expert: false
  agent_template: "./forensic_agent/configs/agent_template.txt"
  reporter:
    prompt_path: "./forensic_agent/configs/prompts/reporter_prompt.txt"
  save_dir: "./outputs/agent_results_confuse_qwen3_WildRF_WIRA"
  expert_models: 
    - "DRCT"
    - "SPAI"
    - "RINE"
    - "PatchShuffle"

